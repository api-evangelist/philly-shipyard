aid: philly-shipyard
name: Philly Shipyard
description: >-
  Philly Shipyard (now Hanwha Philly Shipyard, Inc.) is a commercial
  shipbuilder based at the former Philadelphia Naval Shipyard, constructing
  Jones Act-compliant container ships, product and Aframax tankers, and
  National Security Multi-Mission Vessels (NSMVs) for the U.S. Maritime
  Administration and state maritime academies. In December 2024, Hanwha
  Systems and Hanwha Ocean (subsidiaries of South Korea's Hanwha Group)
  completed the acquisition of Philly Shipyard for approximately $100M,
  rebranding the operation as Hanwha Philly Shipyard Inc. (HPSI). No public
  developer APIs have been identified at this time.
